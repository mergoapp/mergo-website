<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mergo x Suzy Q</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.hero {
  height: 40vh;
  background: url('event.jpg') center/cover no-repeat;
}

.container {
  max-width: 400px;
  margin: -40px auto;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #2a2a2a;
  border: none;
  border-radius: 8px;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  background: #ff4d6d;
  border: none;
  border-radius: 8px;
  color: white;
}

.small {
  font-size: 12px;
  color: #777;
  text-align: center;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="container">

<form id="form">

  <input id="name" placeholder="Full Name" required>
  <input id="phone" placeholder="Phone Number" required>
  <input id="instagram" placeholder="Instagram Handle" required>

  <select id="entry" required>
    <option value="">Select Entry Type</option>
    <option>Single Lady</option>
    <option>Couple</option>
    <option>Stag</option>
  </select>

  <button type="submit">Request Access</button>

</form>

<div class="small">
  Limited entries. Confirmation will be shared via WhatsApp.
</div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const instagram = document.getElementById("instagram").value;
  const entry = document.getElementById("entry").value;

  const url = "https://script.google.com/macros/s/AKfycbz4wuj3qfRLyehvAzKuUne3i6cpSPEvRWwVjC0M_iUH0rmiV8htrCqPuy-l6sP9378xOg/exec"
    + "?name=" + encodeURIComponent(name)
    + "&phone=" + encodeURIComponent(phone)
    + "&instagram=" + encodeURIComponent(instagram)
    + "&entry=" + encodeURIComponent(entry);

  fetch(url);

  alert("You're on the list 🚀");

  document.getElementById("form").reset();
});
</script>

</body>
</html>
